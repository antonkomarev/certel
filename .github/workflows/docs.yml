name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - docs/**
      - .github/workflows/docs.yml
  workflow_dispatch:

# Least privilege for the build job; the deploy job requests Pages tokens.
permissions:
  contents: read

# Allow one concurrent deployment; never cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # enableGitInfo needs full history for lastmod
      - name: Install Hugo extended
        run: |
          wget -O /tmp/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb
      - uses: actions/setup-go@v6
        with:
          go-version-file: docs/go.mod
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Build
        # --panicOnWarning turns the render-link hook's "unresolved" warnings
        # (and any other Hugo warning) into a build failure, so a broken
        # cross-link fails the PR instead of shipping.
        run: >-
          hugo --source docs --gc --minify --panicOnWarning
          --baseURL "${{ steps.pages.outputs.base_url }}/"
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/public

  deploy:
    needs: build
    # Build runs on every PR for validation; only publish from main / manual runs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
