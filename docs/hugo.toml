baseURL = "https://antonkomarev.github.io/certel/"
title = "certel"

# Pretty, section-based navigation is derived from the content tree, so the
# published site mirrors docs/content/ one-to-one.
enableRobotsTXT = true
enableGitInfo = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.goldmark.renderer]
    # Hextra shortcodes and inline HTML in the ADRs rely on raw HTML passing
    # through Goldmark untouched.
    unsafe = true
  [markup.highlight]
    noClasses = false

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3

[menu]
  [[menu.main]]
    name = "Documentation"
    pageRef = "/"
    weight = 1
  [[menu.main]]
    name = "ADRs"
    pageRef = "/adr"
    weight = 2
  [[menu.main]]
    name = "Search"
    weight = 3
    [menu.main.params]
      type = "search"
  [[menu.main]]
    name = "GitHub"
    weight = 4
    url = "https://github.com/antonkomarev/certel"
    [menu.main.params]
      icon = "github"

[params]
  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.page]
    width = "normal"

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = false

  [params.editURL]
    enable = true
    base = "https://github.com/antonkomarev/certel/edit/main/docs/content"
