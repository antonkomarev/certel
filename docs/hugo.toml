baseURL = "https://antonkomarev.github.io/certel/"
title = "certel"

# Pretty, section-based navigation is derived from the content tree, so the
# published site mirrors docs/content/ one-to-one.
enableRobotsTXT = true
enableGitInfo = true

# Emit an llms.txt at the site root — a structured outline of every section and
# page for AI agents/LLMs. Only the home kind carries the extra format; page and
# section keep Hugo's defaults. Exclude a page with `llms: false` in its front
# matter. The template pulls the site description below into the summary line.
[outputs]
  home = ["html", "llms"]

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.goldmark.renderer]
    # Hextra shortcodes and inline HTML in the ADRs rely on raw HTML passing
    # through Goldmark untouched.
    unsafe = true
  [markup.highlight]
    noClasses = false

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3

[menu]
  [[menu.main]]
    name = "Home"
    pageRef = "/"
    weight = 1
  [[menu.main]]
    name = "Search"
    weight = 3
    [menu.main.params]
      type = "search"
  [[menu.main]]
    name = "GitHub"
    weight = 4
    url = "https://github.com/antonkomarev/certel"
    [menu.main.params]
      icon = "github"

[params]
  description = "Self-hosted SSL/TLS certificate monitor: a single binary and a single YAML file, with templated webhook alerts and optional Prometheus metrics."

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.page]
    width = "normal"

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = false

  [params.editURL]
    enable = true
    base = "https://github.com/antonkomarev/certel/edit/main/docs/content"
